name: Bootstrap Pocket Pal source

on:
  push:
    branches:
      - main
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap-pocket-pal.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reconstruct and unpack source archive
        shell: bash
        run: |
          set -euo pipefail
          if ! compgen -G '.bootstrap/part-*' > /dev/null; then
            echo 'Pocket Pal source is already unpacked.'
            exit 0
          fi
          cat .bootstrap/part-* | base64 --decode > /tmp/pocket-pal.tar.xz
          tar -xJf /tmp/pocket-pal.tar.xz
          rm -rf .bootstrap

      - name: Commit Pocket Pal source
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add Pocket Pal application'
          git push origin main
